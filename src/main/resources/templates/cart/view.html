<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Shopping Cart</h2>

<table class="table table-bordered text-center align-middle">
    <thead class="table-dark">
    <tr>
        <th>Name</th>
        <th>Image</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
    </tr>
    </thead>

    <tbody>

    <!-- Nếu giỏ hàng trống -->
    <tr th:if="${#lists.isEmpty(cart)}">
        <td colspan="5" class="text-danger">Giỏ hàng trống</td>
    </tr>

    <!-- Danh sách -->
    <tr th:each="item : ${cart}">
        <td th:text="${item.name}"></td>

        <td>
            <img th:src="${item.image}" width="80">
        </td>

        <td th:text="${item.price}"></td>

        <!-- QUANTITY + / - -->
        <td>

            <a th:href="@{/cart/decrease/{id}(id=${item.productId})}"
               class="btn btn-danger btn-sm">-</a>

            <span class="mx-2 fw-bold" th:text="${item.quantity}"></span>

            <a th:href="@{/cart/increase/{id}(id=${item.productId})}"
               class="btn btn-success btn-sm">+</a>

        </td>

        <!-- TOTAL -->
        <td th:text="${item.price * item.quantity}"></td>
    </tr>

    </tbody>
</table>

<!-- TOTAL CART -->
<div class="text-end mt-3">
    <h4>
        Tổng tiền:
        <span class="text-success"
              th:text="${#aggregates.sum(cart.![(price * quantity)])}">
        </span>
    </h4>
</div>

<!-- BUTTON -->
<div class="mt-3">
    <a href="/products" class="btn btn-primary">← Tiếp tục mua</a>
</div>
<form action="/cart/checkout" method="post">
    <button type="submit" class="btn btn-success">
        Checkout
    </button>
</form>
</body>
</html>
