<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .star {
            font-size: 25px;
            cursor: pointer;
            color: gold;
        }

        .star-gray {
            color: #ccc;
        }

        .star-hover {
            color: orange;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container mt-4">

    <div class="row">

        <!-- PRODUCT -->
        <div class="col-md-5">
            <img th:src="${product.image}" class="img-fluid">
        </div>

        <div class="col-md-7">
            <h3 th:text="${product.name}"></h3>

            <h4 class="text-success" th:text="${product.price}"></h4>

            <!-- AVG RATING -->
            <div class="mb-3">
                <span th:each="i : ${#numbers.sequence(1,5)}">
                    <i class="star"
                       th:classappend="${i <= avgRating} ? '' : 'star-gray'">★</i>
                </span>

                <span th:text="${#numbers.formatDecimal(avgRating,1,1)} + ' / 5'"></span>
            </div>
        </div>

    </div>

    <hr>

    <!-- FORM REVIEW -->
    <div sec:authorize="isAuthenticated()">

        <h4>Đánh giá của bạn</h4>

        <form th:action="@{/products/review}" method="post">

            <input type="hidden" name="productId" th:value="${product.id}">
            <input type="hidden" name="rating" id="ratingValue">

            <!-- STAR CLICK -->
            <div id="starBox">
                <span th:each="i : ${#numbers.sequence(1,5)}"
                      class="star star-gray"
                      th:attr="data-value=${i}">★</span>
            </div>

            <textarea name="comment" class="form-control mt-3"
                      placeholder="Nhận xét..."
                      th:text="${userReview != null ? userReview.comment : ''}">
            </textarea>

            <button class="btn btn-primary mt-3">Gửi đánh giá</button>

        </form>

    </div>

    <hr>

    <!-- LIST REVIEW -->
    <h4>Tất cả đánh giá</h4>

    <div th:each="r : ${reviews}" class="border p-2 mb-2">

        <b th:text="${r.username}"></b>

        <div>
            <span th:each="i : ${#numbers.sequence(1,5)}">
                <i class="star"
                   th:classappend="${i <= r.rating} ? '' : 'star-gray'">★</i>
            </span>
        </div>

        <p th:text="${r.comment}"></p>

    </div>

</div>

<!-- SCRIPT CLICK SAO -->
<script>
    const stars = document.querySelectorAll("#starBox .star");
    const ratingInput = document.getElementById("ratingValue");

    stars.forEach(star => {
        star.addEventListener("click", function () {
            let value = this.getAttribute("data-value");
            ratingInput.value = value;

            stars.forEach(s => s.classList.add("star-gray"));

            for (let i = 0; i < value; i++) {
                stars[i].classList.remove("star-gray");
            }
        });
    });
</script>

</body>
</html>
