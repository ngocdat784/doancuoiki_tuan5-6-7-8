<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .container {
            margin-top: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
        }

        img {
            border-radius: 10px;
            object-fit: cover;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="card-custom">

        <h2>Product Management</h2>

        <!-- SEARCH + SORT + FILTER -->
        <div class="row mb-3">

            <!-- SEARCH -->
            <div class="col-md-4">
                <form th:action="@{/products/search}" method="get" class="d-flex">
                    <input type="text" name="keyword"
                           class="form-control me-2"
                           placeholder="Nhập tên sản phẩm..."
                           th:value="${keyword}">

                    <!-- giữ sort + category -->
                    <input type="hidden" name="sortDir" th:value="${sortDir}">
                    <input type="hidden" name="categoryId" th:value="${categoryId}">

                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>
            </div>

            <!-- SORT -->
            <div class="col-md-3">
                <form method="get"
                      th:action="@{/products/search}">

                    <input type="hidden" name="keyword" th:value="${keyword}">
                    <input type="hidden" name="categoryId" th:value="${categoryId}">

                    <select name="sortDir" class="form-select" onchange="this.form.submit()">
                        <option value="asc" th:selected="${sortDir == 'asc'}">Giá tăng</option>
                        <option value="desc" th:selected="${sortDir == 'desc'}">Giá giảm</option>
                    </select>
                </form>
            </div>

            <!-- FILTER CATEGORY -->
            <div class="col-md-3">
                <form method="get" th:action="@{/products/search}">

                    <input type="hidden" name="keyword" th:value="${keyword}">
                    <input type="hidden" name="sortDir" th:value="${sortDir}">

                    <select name="categoryId" class="form-select" onchange="this.form.submit()">
                        <option value="">-- Tất cả danh mục --</option>

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${c.id == categoryId}">
                        </option>
                    </select>
                </form>
            </div>

        </div>

        <!-- Keyword -->
        <div th:if="${keyword != null}">
            <p>Kết quả tìm kiếm: <b th:text="${keyword}"></b></p>
        </div>

        <!-- Button -->
        <a th:href="@{/products/add}" class="btn btn-primary mb-3">
            + Create New Product
        </a>

        <!-- TABLE -->
        <table class="table table-striped text-center">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Image</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <!-- Empty -->
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6" class="text-danger">Không có sản phẩm</td>
            </tr>

            <!-- Data -->
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>

                <td>
                    <img th:src="${p.image}" width="100">
                </td>

                <td>
                    <span class="badge bg-success" th:text="${p.price}"></span>
                </td>

                <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>

               <td>

    <a th:href="@{/cart/add/{id}(id=${p.id})}"
       class="btn btn-success btn-sm">
        Add to Cart
    </a>

    <a th:href="@{/products/edit/{id}(id=${p.id})}"
       class="btn btn-secondary btn-sm">Edit</a>

    <a th:href="@{/products/delete/{id}(id=${p.id})}"
       class="btn btn-danger btn-sm"
       onclick="return confirm('Xóa?')">Delete</a>

</td>
            </tr>

            </tbody>
        </table>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-center mt-4">

            <!-- Previous -->
            <a th:if="${currentPage > 0}"
               th:href="@{/products/search(
                    keyword=${keyword},
                    categoryId=${categoryId},
                    page=${currentPage - 1},
                    sortDir=${sortDir})}"
               class="btn btn-secondary me-2">Previous</a>

            <!-- Page -->
            <span class="mx-3">
                Trang <b th:text="${currentPage + 1}"></b> /
                <b th:text="${totalPages}"></b>
            </span>

            <!-- Next -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products/search(
                    keyword=${keyword},
                    categoryId=${categoryId},
                    page=${currentPage + 1},
                    sortDir=${sortDir})}"
               class="btn btn-secondary ms-2">Next</a>

        </div>

    </div>

</div>

</body>
</html>
