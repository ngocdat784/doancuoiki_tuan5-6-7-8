<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .container {
            margin-top: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
            transition: 0.3s;
        }

        img {
            border-radius: 10px;
            object-fit: cover;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 8px 16px;
        }

        .btn-secondary, .btn-danger {
            border-radius: 8px;
            padding: 5px 12px;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="card-custom">

        <h2>Product Management</h2>

        <a th:href="@{/products/add}" class="btn btn-primary mb-3">
            + Create New Product
        </a>

        <table class="table table-striped align-middle text-center">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Image</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>

                <td th:text="${product.name}"></td>

                <td>
                    <img th:src="${product.image}" width="120" height="90">
                </td>

                <td>
                    <span class="badge bg-success" th:text="${product.price}"></span>
                </td>

                <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>

                <td>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="btn btn-secondary btn-sm">Edit</a>

                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
