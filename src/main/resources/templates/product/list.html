<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .container {
            margin-top: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
            transition: 0.3s;
        }

        img {
            border-radius: 10px;
            object-fit: cover;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 8px 16px;
        }

        .btn-secondary, .btn-danger {
            border-radius: 8px;
            padding: 5px 12px;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="card-custom">

        <h2>Product Management</h2>

        <!-- SEARCH + SORT -->
        <div class="row mb-3">

            <!-- SEARCH -->
            <div class="col-md-6">
                <form th:action="@{/products/search}" method="get" class="d-flex">
                    <input type="text"
                           name="keyword"
                           class="form-control me-2"
                           placeholder="Nhập tên sản phẩm..."
                           th:value="${keyword}">

                    <!-- giữ sort -->
                    <input type="hidden" name="sortDir" th:value="${sortDir}">

                    <button type="submit" class="btn btn-primary">Tìm kiếm</button>
                </form>
            </div>

            <!-- SORT -->
            <div class="col-md-3">
                <form method="get"
                      th:action="${keyword != null} ? @{/products/search} : @{/products}">

                    <!-- giữ keyword nếu có -->
                    <input type="hidden" name="keyword" th:value="${keyword}">

                    <select name="sortDir" class="form-select" onchange="this.form.submit()">
                        <option value="asc" th:selected="${sortDir == 'asc'}">
                            Giá tăng dần
                        </option>
                        <option value="desc" th:selected="${sortDir == 'desc'}">
                            Giá giảm dần
                        </option>
                    </select>
                </form>
            </div>

        </div>

        <!-- Hiển thị keyword -->
        <div th:if="${keyword != null}">
            <p>Kết quả tìm kiếm cho: <b th:text="${keyword}"></b></p>
        </div>

        <a th:href="@{/products/add}" class="btn btn-primary mb-3">
            + Create New Product
        </a>

        <!-- TABLE -->
        <table class="table table-striped align-middle text-center">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Image</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <!-- Không có dữ liệu -->
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6" class="text-danger">
                    Không tìm thấy sản phẩm nào
                </td>
            </tr>

            <!-- Danh sách -->
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>

                <td th:text="${product.name}"></td>

                <td>
                    <img th:src="${product.image}" width="120" height="90">
                </td>

                <td>
                    <span class="badge bg-success" th:text="${product.price}"></span>
                </td>

                <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>

                <td>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="btn btn-secondary btn-sm">Edit</a>

                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</a>
                </td>
            </tr>

            </tbody>
        </table>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-center align-items-center mt-4">

            <!-- Previous -->
            <a th:if="${currentPage > 0 and keyword != null}"
               th:href="@{/products/search(keyword=${keyword}, page=${currentPage - 1}, sortDir=${sortDir})}"
               class="btn btn-secondary me-2">Previous</a>

            <a th:if="${currentPage > 0 and keyword == null}"
               th:href="@{/products(page=${currentPage - 1}, sortDir=${sortDir})}"
               class="btn btn-secondary me-2">Previous</a>

            <!-- Page info -->
            <span class="mx-3">
                Trang <b th:text="${currentPage + 1}"></b> /
                <b th:text="${totalPages}"></b>
            </span>

            <!-- Next -->
            <a th:if="${currentPage < totalPages - 1 and keyword != null}"
               th:href="@{/products/search(keyword=${keyword}, page=${currentPage + 1}, sortDir=${sortDir})}"
               class="btn btn-secondary ms-2">Next</a>

            <a th:if="${currentPage < totalPages - 1 and keyword == null}"
               th:href="@{/products(page=${currentPage + 1}, sortDir=${sortDir})}"
               class="btn btn-secondary ms-2">Next</a>

        </div>

    </div>

</div>

</body>
</html>
