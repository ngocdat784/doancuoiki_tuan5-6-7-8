<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .container {
            margin-top: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
        }

        img {
            border-radius: 10px;
            object-fit: cover;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }
        .star {
    color: gold;
    font-size: 16px;
}

.star-gray {
    color: #ccc;
}
.card img {
    object-fit: cover;
}

.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
    </style>
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="card-custom">

        <h2>Product Management</h2>

        <!-- ORDER NAVIGATION -->
        <div class="mb-3">

            <span sec:authorize="hasRole('USER')">
                <a th:href="@{/cart/my-orders}" class="btn btn-info">
                    Lịch sử đặt hàng
                </a>
            </span>

            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/cart/admin/orders}" class="btn btn-dark">
                    Quản lý đơn hàng
                </a>
            </span>

        </div>

        <!-- USER INFO -->
        <div sec:authorize="isAuthenticated()" class="mb-3 text-end">

            <span class="me-3">
                User:
                <b sec:authentication="name"></b>
            </span>

            <span class="me-3">
                <span class="badge bg-info text-dark me-1"
                      th:each="auth : ${#authentication.authorities}"
                      th:if="${#strings.contains(auth.authority, 'ROLE_')}"
                      th:text="${#strings.replace(auth.authority, 'ROLE_', '')}">
                </span>
            </span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn btn-danger btn-sm">
                    Logout
                </button>
            </form>

        </div>

        <!-- SEARCH + SORT + FILTER -->
        <div class="row mb-3">

            <!-- SEARCH -->
            <div class="col-md-4">
                <form th:action="@{/products/search}" method="get" class="d-flex">
                    <input type="text" name="keyword"
                           class="form-control me-2"
                           placeholder="Nhập tên sản phẩm..."
                           th:value="${keyword}">

                    <input type="hidden" name="sortDir" th:value="${sortDir}">
                    <input type="hidden" name="categoryId" th:value="${categoryId}">

                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>
            </div>

            <!-- SORT -->
            <div class="col-md-3">
                <form method="get" th:action="@{/products/search}">
                    <input type="hidden" name="keyword" th:value="${keyword}">
                    <input type="hidden" name="categoryId" th:value="${categoryId}">

                    <select name="sortDir" class="form-select" onchange="this.form.submit()">
                        <option value="asc" th:selected="${sortDir == 'asc'}">Giá tăng</option>
                        <option value="desc" th:selected="${sortDir == 'desc'}">Giá giảm</option>
                    </select>
                </form>
            </div>

            <!-- FILTER -->
            <div class="col-md-3">
                <form method="get" th:action="@{/products/search}">
                    <input type="hidden" name="keyword" th:value="${keyword}">
                    <input type="hidden" name="sortDir" th:value="${sortDir}">

                    <select name="categoryId" class="form-select" onchange="this.form.submit()">
                        <option value="">-- Tất cả danh mục --</option>

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${c.id == categoryId}">
                        </option>
                    </select>
                </form>
            </div>

        </div>

        <!-- ================= USER VIEW ================= -->
        <div sec:authorize="hasRole('USER')">

            <div th:if="${#lists.isEmpty(products)}" class="text-danger">
                Không có sản phẩm
            </div>

            <div class="row">

                <div class="col-md-3 mb-4" th:each="p : ${products}">

                    <div class="card h-100 shadow-sm">

                        <img th:src="${p.image}" class="card-img-top" height="180">

                        <div class="card-body text-center">

                            <h6 th:text="${p.name}"></h6>

                            <p class="text-success fw-bold"
                               th:text="${p.price}"></p>

                            <small th:text="${p.category != null ? p.category.name : 'N/A'}"></small>

                            <!-- ⭐ RATING -->
                            <div th:with="avg=${reviewService.getAverageRating(p.id)}">

                                <span th:each="i : ${#numbers.sequence(1,5)}">
                                    <i class="star"
                                       th:classappend="${i <= avg} ? '' : 'star-gray'">★</i>
                                </span>

                                <div>
                                    <small th:text="${#numbers.formatDecimal(avg,1,1)} + ' / 5'"></small>
                                </div>

                            </div>

                        </div>

                        <div class="card-footer text-center">

                            <a th:href="@{/cart/add/{id}(id=${p.id})}"
                               class="btn btn-success btn-sm">
                                Add
                            </a>

                            <a th:href="@{/products/{id}(id=${p.id})}"
                               class="btn btn-warning btn-sm">
                                Đánh giá
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- ================= ADMIN VIEW ================= -->
        <div sec:authorize="hasRole('ADMIN')">

            <table class="table table-striped text-center">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Image</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Rating</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="7" class="text-danger">Không có sản phẩm</td>
                </tr>

                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>

                    <td>
                        <img th:src="${p.image}" width="100">
                    </td>

                    <td>
                        <span class="badge bg-success" th:text="${p.price}"></span>
                    </td>

                    <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>

                    <td>
                        <div th:with="avg=${reviewService.getAverageRating(p.id)}">

                            <span th:each="i : ${#numbers.sequence(1,5)}">
                                <i class="star"
                                   th:classappend="${i <= avg} ? '' : 'star-gray'">★</i>
                            </span>

                            <div>
                                <small th:text="${#numbers.formatDecimal(avg,1,1)} + ' / 5'"></small>
                            </div>

                        </div>
                    </td>

                    <td>
                        

                        <a th:href="@{/products/edit/{id}(id=${p.id})}"
                           class="btn btn-secondary btn-sm">Edit</a>

                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa?')">Delete</a>
                    </td>
                </tr>

                </tbody>
            </table>

        </div>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-center mt-4">

            <a th:if="${currentPage > 0}"
               th:href="@{/products/search(
                    keyword=${keyword},
                    categoryId=${categoryId},
                    page=${currentPage - 1},
                    sortDir=${sortDir})}"
               class="btn btn-secondary me-2">Previous</a>

            <span class="mx-3">
                Trang <b th:text="${currentPage + 1}"></b> /
                <b th:text="${totalPages}"></b>
            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products/search(
                    keyword=${keyword},
                    categoryId=${categoryId},
                    page=${currentPage + 1},
                    sortDir=${sortDir})}"
               class="btn btn-secondary ms-2">Next</a>

        </div>

    </div>

</div>

</body>
</html>
