<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Category List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .container {
            margin-top: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container">

    <div class="card-custom">

        <h2>Category Management</h2>

        <!-- USER INFO -->
        <div sec:authorize="isAuthenticated()" class="mb-3 text-end">

            <span class="me-3">
                User:
                <b sec:authentication="name"></b>
            </span>

            <span class="me-3">
                <span class="badge bg-info text-dark me-1"
                      th:each="auth : ${#authentication.authorities}"
                      th:if="${#strings.contains(auth.authority, 'ROLE_')}"
                      th:text="${#strings.replace(auth.authority, 'ROLE_', '')}">
                </span>
            </span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn btn-danger btn-sm">
                    Logout
                </button>
            </form>

        </div>

        <!-- SEARCH -->
        <div class="row mb-3">
            <div class="col-md-4">
                <form th:action="@{/categories/search}" method="get" class="d-flex">
                    <input type="text" name="keyword"
                           class="form-control me-2"
                           placeholder="Nhập tên danh mục..."
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>
            </div>
        </div>

       <div sec:authorize="hasRole('ADMIN')">

    <!-- CREATE -->
    <a th:href="@{/categories/add}" class="btn btn-primary mb-3">
        + Create New Category
    </a>

    <!-- BACK TO HOME -->
    <a th:href="@{/products}" class="btn btn-secondary mb-3 ms-2">
        ← Back to Home
    </a>

</div>

        <!-- TABLE -->
        <table class="table table-striped text-center">
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <!-- Empty -->
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="3" class="text-danger">Không có danh mục</td>
            </tr>

            <!-- Data -->
            <tr th:each="c : ${categories}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.name}"></td>

                <td>
                    <span sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/categories/edit/{id}(id=${c.id})}"
                           class="btn btn-secondary btn-sm">Edit</a>

                        <a th:href="@{/categories/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa?')">Delete</a>
                    </span>
                </td>
            </tr>

            </tbody>
        </table>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-center mt-4">

            <!-- Previous -->
            <a th:if="${currentPage > 0}"
               th:href="@{/categories/search(
                    keyword=${keyword},
                    page=${currentPage - 1})}"
               class="btn btn-secondary me-2">Previous</a>

            <!-- Page -->
            <span class="mx-3">
                Trang <b th:text="${currentPage + 1}"></b> /
                <b th:text="${totalPages}"></b>
            </span>

            <!-- Next -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/categories/search(
                    keyword=${keyword},
                    page=${currentPage + 1})}"
               class="btn btn-secondary ms-2">Next</a>

        </div>

    </div>

</div>

</body>
</html>
