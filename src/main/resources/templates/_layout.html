<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Bài 5_QLSP JPA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<!-- DEBUG -->
<div style="background: yellow; color: black; padding: 5px;">
    <p th:text="${#authentication}"></p>
</div>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- Left menu -->
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>

            <!-- Chỉ ADMIN thấy -->
            <span sec:authorize="hasRole('ADMIN')">
                <a class="navbar-brand" th:href="@{/products/add}">Add Product</a>
            </span>
        </div>

        <!-- Right menu -->
        <div class="d-flex align-items-center text-white">

            <!-- Hiển thị username -->
            <span class="me-3">
                User: <b th:text="${#authentication.name}"></b>
            </span>

            <!-- Hiển thị role (bỏ ROLE_) -->
            <span class="me-3">
                Role:
                <span th:text="${#authentication.authorities[0].authority.replace('ROLE_', '')}"></span>
            </span>

            <!-- Logout -->
            <a th:href="@{/logout}" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<!-- DEBUG (chỉ dùng khi test, có thể xóa sau) -->
<div class="d-flex align-items-center">
    <span style="color: red;">
        DEBUG: <span th:text="${#authentication}"></span>
    </span>
</div>

<!-- Nội dung chính -->
<div layout:fragment="content" class="container mt-4">
</div>

<!-- Footer -->
<div class="card-footer text-center mt-5">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

</body>
</html>
