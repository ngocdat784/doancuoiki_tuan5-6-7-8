<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Bài 5_QLSP JPA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- LEFT -->
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>

            <!-- ADMIN -->
            <span sec:authorize="hasRole('ADMIN')">
                <a class="navbar-brand" th:href="@{/products/add}">Add Product</a>
            </span>
        </div>

        <!-- RIGHT -->
        <div class="d-flex align-items-center text-white">

            <!-- CHƯA LOGIN -->
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn btn-success btn-sm">
                    Login
                </a>
            </div>

            <!-- ĐÃ LOGIN -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">

                <!-- Username -->
                <span class="me-3">
                    User:
                    <b sec:authentication="name"></b>
                </span>

                <!-- Roles -->
                <span class="me-3 d-flex align-items-center">
                    Role:
                    <span class="ms-2">
                        <span class="badge bg-info text-dark me-1"
                              th:each="auth : ${#authentication.authorities}"
                              th:text="${#strings.replace(auth.authority, 'ROLE_', '')}">
                        </span>
                    </span>
                </span>

                <!-- Logout -->
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-danger btn-sm">
                        Logout
                    </button>
                </form>

            </div>

        </div>

    </div>
</nav>

<!-- Nội dung chính -->
<div layout:fragment="content" class="container mt-4">
</div>

<!-- Footer -->
<div class="card-footer text-center mt-5">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

</body>
</html>
