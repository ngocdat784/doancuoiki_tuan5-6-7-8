<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content" class="container mt-4">

    <div class="card-custom">

        <h2>Lịch sử đơn hàng của tôi</h2>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(orders)}" class="alert alert-warning">
            Bạn chưa có đơn hàng nào
        </div>

        <!-- TABLE -->
        <table class="table table-bordered text-center"
               th:if="${!#lists.isEmpty(orders)}">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ngày đặt</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>

                <!-- DATE (fix null) -->
                <td th:text="${o.orderDate != null 
                    ? #dates.format(o.orderDate, 'dd/MM/yyyy HH:mm') 
                    : 'N/A'}">
                </td>

                <!-- TOTAL -->
                <td>
                    <span class="badge bg-success"
                          th:text="${o.totalAmount}"></span>
                </td>

                <!-- STATUS (fix null + màu đẹp) -->
                <td>
                   <span class="badge"
      th:classappend="${o.status != null ?
            (o.status.name() == 'PENDING' ? 'bg-warning' :
            (o.status.name() == 'CONFIRMED' ? 'bg-info' :
            (o.status.name() == 'SHIPPING' ? 'bg-primary' :
            (o.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'))))
            : 'bg-secondary'}"
      th:text="${o.status}">
</span>
                </td>

            </tr>

            </tbody>
        </table>

        <!-- BACK BUTTON -->
        <div class="mt-3">
            <a th:href="@{/products}" class="btn btn-secondary">
                ← Quay lại trang sản phẩm
            </a>
        </div>

    </div>

</div>

</body>
</html>
